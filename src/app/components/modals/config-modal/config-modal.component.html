<ion-modal
  #configModal
  trigger="openConfigModal"
  (willPresent)="onWillPresent()"
>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Ajustes</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="modalClose()">Cerrar</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-nav #nav></ion-nav>
    </ion-content>
  </ng-template>
</ion-modal>
