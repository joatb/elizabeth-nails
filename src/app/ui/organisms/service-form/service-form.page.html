<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Cancelar</ion-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding" [fullscreen]="true">
  @if(form){
    <ion-fab slot="fixed" vertical="bottom" horizontal="end">
      <ion-fab-button color="success" (click)="submit()" [disabled]="!form.valid">
        <ion-icon name="save-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  }
  <form [formGroup]="form">
    <ion-list>
      <ion-item lines="full">
        <ion-input
          aria-label="Nombre"
          type="text"
          placeholder="Nombre"
          formControlName="name"
        ></ion-input>
      </ion-item>
      @if(form.get('name')?.invalid && (form.get('name')?.dirty || form.get('name')?.touched)) {
        <ion-item lines="full">
          <ion-text color="danger">
            <p>El nombre es requerido</p>
          </ion-text>
        </ion-item>
      }

      <ion-item lines="full">
        <ion-textarea
          aria-label="Descripción"
          placeholder="Descripción"
          formControlName="description"
        ></ion-textarea>
      </ion-item>

      <ion-item lines="full">
        <ion-input
          aria-label="Precio"
          type="number"
          min="0"
          step="0.01"
          placeholder="Precio"
          formControlName="price"
        ></ion-input>
      </ion-item>
      @if(form.get('price')?.invalid && (form.get('price')?.dirty || form.get('price')?.touched)) {
        <ion-item lines="full">
          <ion-text color="danger">
            <p>El precio debe ser 0 o mayor</p>
          </ion-text>
        </ion-item>
      }

      <ion-item lines="full">
        <ion-label>Color</ion-label>
        <input aria-label="Color" type="color" formControlName="color" />
      </ion-item>
    </ion-list>
  </form>
</ion-content>
