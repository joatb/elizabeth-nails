<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button
        *ngIf="showLogoutButton"
        (click)="handleLogout()"
        color="primary-contrast"
        fill="clear"
      >
        <i-lucide [img]="logoutIcon"></i-lucide>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
