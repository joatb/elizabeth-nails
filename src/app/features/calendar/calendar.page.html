<org-calendar-toolbar
  title="Calendario"
  [logoutIcon]="LogOut"
  [scheduleIcon]="Clock"
  [configIcon]="EllipsisVertical"
  (logout)="authService.logout()"
></org-calendar-toolbar>

<ion-content class="ion-padding" [fullscreen]="true" style="max-height: 100vh">
  <ion-skeleton-text
    *ngIf="isLoadingEvents"
    animated
    style="width: 100%; height: 100vh; border-radius: 12px"
  ></ion-skeleton-text>
  <full-calendar
    #calendar
    [options]="calendarOptions"
    [ngClass]="{'calendar-hidden': isLoadingEvents}"
  ></full-calendar>

  <org-month-picker-modal
    [isOpen]="isMonthPickerOpen"
    [value]="monthPickerValue"
    (valueChange)="monthPickerValue = $event ?? monthPickerValue"
    (cancel)="cancelMonthPicker()"
    (confirm)="confirmMonthPicker($event)"
    (dismiss)="onMonthPickerDismiss()"
  ></org-month-picker-modal>

  <org-calendar-schedule-modal
    title="Horarios"
    triggerId="openModal"
  ></org-calendar-schedule-modal>

  <app-config-modal></app-config-modal>
</ion-content>
